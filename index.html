<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denz Store - QRIS Dinamis</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 100%; }
        input { padding: 10px; width: 80%; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-pay { background: #007bff; color: white; width: 85%; }
        .btn-check { background: #28a745; color: white; margin-top: 15px; display: none; width: 85%; }
        #qr-container img { margin-top: 15px; max-width: 250px; border: 5px solid white; }
        #pesan-status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Denz Store</h2>
        <p>Masukkan Nominal Pembayaran</p>
        <input type="number" id="nominal" placeholder="Contoh: 10000">
        <button class="btn-pay" id="btn-bayar" onclick="buatQRIS()">Buat Pembayaran</button>

        <div id="qr-container"></div>
        
        <button class="btn-check" id="btn-cek" onclick="cekStatus()">Cek Status Pembayaran</button>
        <p id="pesan-status"></p>
    </div>

    <script>
        let currentOrderId = null;

        async function buatQRIS() {
            const nominal = document.getElementById('nominal').value;
            const btnBayar = document.getElementById('btn-bayar');
            const qrContainer = document.getElementById('qr-container');
            const btnCek = document.getElementById('btn-cek');

            if (!nominal || nominal < 1) return alert("Minimal 1 rupiah!");


            btnBayar.innerText = "Processing...";
            btnBayar.disabled = true;

            try {
                const res = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nominal })
                });
                const data = await res.json();

                if (data.qrString) {
                    currentOrderId = data.orderId;
                    qrContainer.innerHTML = `
                        <p>Total: <b>Rp ${data.total.toLocaleString()}</b></p>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(data.qrString)}">
                        <p><small>Silakan scan QRIS di atas</small></p>
                    `;
                    btnCek.style.display = "inline-block";
                    btnBayar.innerText = "Buat Pembayaran Baru";
                }
            } catch (err) {
                alert("Gagal membuat QRIS");
            } finally {
                btnBayar.disabled = false;
            }
        }

        async function cekStatus() {
            if (!currentOrderId) return;
            const pesan = document.getElementById('pesan-status');
            pesan.innerText = "Sedang memeriksa mutasi...";

            try {
                const res = await fetch(`/api/check-status?id=${currentOrderId}`);
                const data = await res.json();

                if (data.status === 'SUCCESS') {
                    pesan.innerText = "✅ Pembayaran Berhasil Diselesaikan!";
                    pesan.style.color = "green";
                    document.getElementById('btn-cek').style.display = "none";
                } else {
                    pesan.innerText = "❌ Pembayaran belum masuk. Silakan bayar sesuai nominal!";
                    pesan.style.color = "red";
                }
            } catch (err) {
                pesan.innerText = "⚠️ Gangguan sistem saat cek status.";
            }
        }
    </script>
</body>
</html>
